<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Decentralized Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Voter Registration</h2>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="voter_id">Voter ID (Unique)</label>
                <input type="text" id="voter_id" required placeholder="e.g. V12345">
            </div>
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn">Register Account</button>
        </form>

        <p id="msg" class="message"></p>
        
        <div class="link-text">
            Already registered? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            
            const btn = document.getElementById("submitBtn");
            const msgEl = document.getElementById("msg");
            
            btn.textContent = "Registering...";
            btn.disabled = true;
            msgEl.textContent = "";
            msgEl.className = "message";

            const data = {
                voter_id: document.getElementById("voter_id").value,
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            };

            try {
                const res = await fetch("http://127.0.0.1:5000/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    msgEl.textContent = "Registration successful! Redirecting to login...";
                    msgEl.classList.add("success");
                    setTimeout(() => window.location.href = "login.html", 1500);
                } else {
                    msgEl.textContent = result.message || "Registration failed.";
                    msgEl.classList.add("error");
                    btn.textContent = "Register Account";
                    btn.disabled = false;
                }
            } catch (error) {
                msgEl.textContent = "Network error. Is the backend running?";
                msgEl.classList.add("error");
                btn.textContent = "Register Account";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
