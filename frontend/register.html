<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Decentralized Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Voter Registration</h2>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Priyanka Sharma">
            </div>
            
            <div class="form-group">
                <label for="aadhaar_no">Aadhaar Number (12 digits)</label>
                <input type="text" id="aadhaar_no" required maxlength="12" pattern="\d{12}" placeholder="123456789012">
            </div>

            <div class="form-group">
                <label for="aadhaar_photo">Aadhaar Photo</label>
                <input type="file" id="aadhaar_photo" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="priyanka@example.com">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" required placeholder="Vasai">
            </div>

            <div class="form-group">
                <label for="district">District</label>
                <input type="text" id="district" required placeholder="Palghar">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn">Register Account</button>
        </form>

        <p id="msg" class="message"></p>
        <button id="goToLoginBtn" type="button" style="display: none; margin-top: 0.75rem; width: 100%;" onclick="window.location.href='login.html'">Take me to Login</button>
        
        <div class="link-text">
            Already registered? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        // Force return to landing page on refresh or new session
        if (performance.navigation.type === 1 || !sessionStorage.getItem('portal_session')) {
            window.location.href = 'index.html';
        }
        sessionStorage.setItem('portal_session', 'active');

        async function handleRegister(e) {
            e.preventDefault();
            
            const btn = document.getElementById("submitBtn");
            const msgEl = document.getElementById("msg");
            const goToLoginBtn = document.getElementById("goToLoginBtn");
            
            btn.textContent = "Registering...";
            btn.disabled = true;
            msgEl.textContent = "";
            msgEl.className = "message";
            goToLoginBtn.style.display = "none";

            const aadhaarNo = document.getElementById("aadhaar_no").value.trim();
            if (!/^\d{12}$/.test(aadhaarNo)) {
                msgEl.textContent = "Aadhaar number must be exactly 12 digits.";
                msgEl.classList.add("error");
                btn.textContent = "Register Account";
                btn.disabled = false;
                return;
            }

            const formData = new FormData();
            formData.append("name", document.getElementById("name").value.trim());
            formData.append("aadhaar_no", aadhaarNo);
            formData.append("aadhaar_photo", document.getElementById("aadhaar_photo").files[0]);
            formData.append("email", document.getElementById("email").value.trim());
            formData.append("city", document.getElementById("city").value.trim());
            formData.append("district", document.getElementById("district").value.trim());
            formData.append("password", document.getElementById("password").value);

            try {
                const res = await fetch("http://127.0.0.1:5000/register", {
                    method: "POST",
                    body: formData
                });

                const result = await res.json();

                if (res.ok) {
                    msgEl.textContent = `Registration successful. Your Voter ID is ${result.voter_id}. Please save it, then click Take me to Login.`;
                    msgEl.classList.add("success");
                    btn.textContent = "Registration Complete";
                    goToLoginBtn.style.display = "block";
                } else {
                    msgEl.textContent = result.message || "Registration failed.";
                    msgEl.classList.add("error");
                    btn.textContent = "Register Account";
                    btn.disabled = false;
                }
            } catch (error) {
                msgEl.textContent = "Network error. Is the backend running?";
                msgEl.classList.add("error");
                btn.textContent = "Register Account";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
